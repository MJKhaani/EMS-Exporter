auths:
  ns705_v1:
    version: 1
    community: public
modules:
  ns705:
    walk:
    - 1.3.6.1.2.1.1
    - 1.3.6.1.4.1
    metrics:
    - name: sysDescr
      oid: 1.3.6.1.2.1.1.1.0
      type: DisplayString
      help: Device system description.
    - name: sysUpTime
      oid: 1.3.6.1.2.1.1.3.0
      type: gauge
      help: Device uptime in TimeTicks.
    max_repetitions: 25
    retries: 3
    timeout: 5s
